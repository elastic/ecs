name: "ECS Release: RC Cut"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 9.4.0)"
        required: true
        type: string
      rc_number:
        description: "RC number (default: 1)"
        required: false
        default: "1"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ecs-release-${{ inputs.version }}-rc
  cancel-in-progress: false

jobs:
  rc-cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run RC cut
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: scripts
        run: python scripts/release_automation/run_rc.py "${{ inputs.version }}" "${{ inputs.rc_number }}"
