name: "ECS Release: Release Day"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 9.4.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ecs-release-${{ inputs.version }}-day
  cancel-in-progress: false

jobs:
  release-day:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run release day
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: scripts
        run: python scripts/release_automation/run_day.py "${{ inputs.version }}"
