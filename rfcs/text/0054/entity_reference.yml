---
- name: entity_reference
  fields:
    - name: entity.id
      level: extended
      type: keyword
      normalize:
        - array
      short: Identifiers of referenced entities.
      description: >
        Identifiers of referenced entities, using the same meaning as root
        `entity.id` (stable id for correlation within scope).

    - name: host.id
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced host ids.

    - name: host.name
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced host names.

    - name: service.id
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced service ids.

    - name: service.name
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced service names.

    - name: user.domain
      level: extended
      type: keyword
      normalize:
        - array
      short: Referenced user directory or AD/LDAP domain names.
      description: >
        Referenced user directory or AD/LDAP domain names (same semantics
        as ECS `user.domain`).

    - name: user.email
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced user email addresses.

    - name: user.id
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced user ids.

    - name: user.name
      level: extended
      type: keyword
      normalize:
        - array
      description: >
        Referenced user short names or logins.
