---
- name: entity
  fields:
    - name: attributes.known_redirects
      level: extended
      type: keyword
      short: Known redirect URIs or URLs associated with this entity.
      description: >
        Known redirect URIs or URLs associated with this entity.
        Typically applicable to Service entities.
      normalize:
        - array
      beta: This field is beta and subject to change.

    - name: attributes.managed
      level: extended
      type: boolean
      short: Indicates whether the entity is managed by an external system.
      description: >
        Indicates whether the entity is managed by an external administration
        or control system. Typically applicable to Host and Service entities.
      beta: This field is beta and subject to change.

    - name: attributes.mfa_enabled
      level: extended
      type: boolean
      short: Indicates whether multi-factor authentication is enabled for this entity.
      description: >
        Indicates whether multi-factor authentication is enabled for this entity.
        Typically applicable to User entities.
      beta: This field is beta and subject to change.

    - name: attributes.oauth_consent_restriction
      level: extended
      type: keyword
      short: Restriction applied to OAuth consent for this entity.
      description: >
        Restriction applied to OAuth consent for this entity
        (e.g. `admin_only`, `verified_only`, `unrestricted`).
        Typically applicable to Service entities.
      beta: This field is beta and subject to change.

    - name: attributes.permissions
      level: extended
      type: keyword
      short: Action-level permissions associated with this entity.
      description: >
        Action-level permissions associated with this entity (not roles or groups).
        Typically applicable to User, Host, and Service entities.
      normalize:
        - array
      beta: This field is beta and subject to change.

    - name: attributes.storage_class
      level: extended
      type: keyword
      short: Storage tier or class assigned to an object storage resource.
      description: >
        The storage tier or class assigned to an object storage resource
        (e.g. S3/GCS/Azure object tiers). Common examples include `STANDARD`,
        `STANDARD_IA`, `GLACIER`, `COLDLINE`.
        Typically applicable to Service entities.
      beta: This field is beta and subject to change.

    - name: lifecycle.last_activity
      level: extended
      type: date
      short: Timestamp of the most recent action performed by or attributed to this entity.
      description: >
        Timestamp of the most recent action performed by or attributed to this
        entity (active use). Distinct from `entity.last_seen_timestamp`, which
        records when the entity was last observed in data; `last_activity` implies
        the entity was active, not only seen.
        Typically applicable to User, Host, and Service entities.
      beta: This field is beta and subject to change.
