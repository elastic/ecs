commands_restrictions:
  backport:
    conditions:
      - or:
        - sender-permission>=write
        - sender=github-actions[bot]
defaults:
  actions:
    backport:
      title: "[{{ destination_branch }}] (backport #{{ number }}) {{ title }}"
      assignees:
        - "{{ author }}"
      labels:
        - "backport"

pull_request_rules:
  - name: forwardport docs changes to main
    conditions:
      - merged
      - label=docs
      - files~=^docs/
      - base~=^\d+\.
    actions:
      backport:
        branches:
          - main
        title: "[{{ destination_branch }}] (forwardport #{{ number }}) {{ title }}"

  - name: forward-port changes to main
    conditions:
      - merged
      - label=needs_forward_port
      - base~=^\d+\.
    actions:
      backport:
        branches:
          - main
        labels:
          - forward_port
        title: "[{{ destination_branch }}] (forwardport #{{ number }}) {{ title }}"
